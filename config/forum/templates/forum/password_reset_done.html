{% extends 'forum/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 border-top border-5" style="border-color: #28a745 !important;">
            <div class="card-body p-4 p-md-5 text-center">
                <i class="bi bi-envelope-check-fill text-success" style="font-size: 3rem;"></i>
                <h3 class="fw-bold text-dark mt-3">Email Sent!</h3>
                <p class="text-muted mb-0">We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
