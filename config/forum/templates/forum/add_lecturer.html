{% extends 'forum/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <a href="{% url 'home' %}" class="text-decoration-none text-darkblue mb-3 d-inline-block fw-bold">
            &larr; Back to Home
        </a>
        
        <div class="card shadow-sm border-0 border-top border-5" style="border-color: #003366 !important;">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold text-darkblue mb-3"><i class="bi bi-person-plus-fill me-2"></i>Add Lecturer</h2>
                <p class="text-muted mb-4">Can't find your lecturer? Add them to the database so others can leave reviews.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold text-darkblue">Lecturer Name</label>
                        {{ form.name }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-darkblue">Faculty</label>
                        {{ form.faculty }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-darkblue">Subject</label>
                        {{ form.subject }}
                    </div>
                    
                    <button type="submit" class="btn btn-darkblue fw-bold w-100 shadow-sm py-2">
                        Save Lecturer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
