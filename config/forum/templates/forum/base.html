<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Rating Forum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    .bg-darkblue { background-color: #003366 !important; color: white; }
    .text-darkblue { color: #003366 !important; }
    .btn-darkblue { background-color: #003366; color: white; border: none; }
    .btn-darkblue:hover { background-color: #001f4d; color: white; }
    .btn-outline-darkblue { border: 1px solid #003366; color: #003366; background: transparent; }
    .btn-outline-darkblue:hover { background-color: #003366; color: white; }
</style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light shadow-sm mb-4" style="background-color: #87CEFA;">
    <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="{% url 'home' %}">
            <i class="bi bi-mortarboard-fill me-2 text-darkblue"></i>RateMyLecturer
        </a>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item ms-3">
                    <a class="nav-link fw-bold text-darkblue bg-white rounded shadow-sm px-3 py-1 mt-1" href="{% url 'leaderboard' %}">
                        <i class="bi bi-trophy-fill text-warning me-1"></i> Leaderboard
                    </a>
                </li>
            </ul>
        <div class="d-flex align-items-center">
            {% if user.is_authenticated %}
                    <span class="text-dark me-3">
                        Hello, <a href="{% url 'profile' %}" class="text-darkblue fw-bold text-decoration-none"><u>{{ user.username }}</u></a>
                    </span>
                    <form action="{% url 'logout' %}" method="POST" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-darkblue fw-bold shadow-sm">Log Out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="text-dark text-decoration-none me-3 fw-bold">Log In</a>
                <a href="{% url 'register' %}" class="btn btn-sm btn-darkblue fw-bold shadow-sm">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
