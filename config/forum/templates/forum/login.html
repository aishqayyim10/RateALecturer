{% extends 'forum/base.html' %}

{% block content %}
<style>
    /* Force Django's default inputs to match Bootstrap styling */
    input[type="text"], input[type="password"] {
        width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 5px; margin-top: 5px; margin-bottom: 15px;
    }
    label { font-weight: bold; color: #003366; }
</style>

<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 border-top border-5" style="border-color: #003366 !important;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-darkblue" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold text-darkblue mt-2">Welcome Back</h2>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-darkblue w-100 fw-bold shadow-sm py-2 mt-2">Log In</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="text-muted text-decoration-none small">Forgot your password?</a>
                </div>
                
                <div class="text-center mt-4">
                    <p class="text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-darkblue fw-bold text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
