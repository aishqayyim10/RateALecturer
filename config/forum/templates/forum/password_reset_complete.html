{% extends 'forum/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 border-top border-5" style="border-color: #003366 !important;">
            <div class="card-body p-4 p-md-5 text-center">
                <i class="bi bi-check-circle-fill text-darkblue" style="font-size: 3rem;"></i>
                <h3 class="fw-bold text-darkblue mt-3">Password Changed</h3>
                <p class="text-muted mb-4">Your password has been set. You may go ahead and log in now.</p>
                <a href="{% url 'login' %}" class="btn btn-darkblue fw-bold px-4 shadow-sm">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
