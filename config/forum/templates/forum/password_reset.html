{% extends 'forum/base.html' %}
{% block content %}
<style>
    input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 5px; margin-top: 5px; margin-bottom: 15px; }
    label { font-weight: bold; color: #003366; }
</style>
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 border-top border-5" style="border-color: #003366 !important;">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold text-darkblue mb-3">Reset Password</h3>
                <p class="text-muted small mb-4">Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-darkblue w-100 fw-bold shadow-sm py-2 mt-2">Send Email</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
